<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORTNEYHELL.TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #c8c5be;
    color: #5a5850;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding: 40px 20px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse 60% 25% at 50% 0%, rgba(220, 225, 210, 0.6) 0%, transparent 100%),
      radial-gradient(ellipse 40% 20% at 35% 5%, rgba(215, 220, 205, 0.3) 0%, transparent 100%),
      linear-gradient(180deg,
        #d0cdc5 0%,
        #ccc9c1 30%,
        #c8c5bd 50%,
        #c2bfb7 70%,
        #bbb8b0 100%
      );
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    z-index: 0;
    pointer-events: none;
    animation: grain 8s steps(10) infinite;
  }

  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -10%); }
    20% { transform: translate(-15%, 5%); }
    30% { transform: translate(7%, -25%); }
    40% { transform: translate(-5%, 25%); }
    50% { transform: translate(-15%, 10%); }
    60% { transform: translate(15%, 0%); }
    70% { transform: translate(0%, 15%); }
    80% { transform: translate(3%, 35%); }
    90% { transform: translate(-10%, 10%); }
  }

  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.15) 100%);
    z-index: 0;
    pointer-events: none;
  }

  .tv-room {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tv-wrapper {
    position: relative;
    display: inline-block;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.5)) drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  }

  .tv-image {
    width: min(70vw, 580px);
    height: auto;
    display: block;
    position: relative;
    z-index: 2;
    pointer-events: none;
    filter: saturate(0.85) brightness(0.95);
  }

  /* Screen area */
  .screen-area {
    position: absolute;
    top: 22.3%;
    left: 20.9%;
    width: 58.2%;
    height: 43.2%;
    z-index: 3;
    overflow: hidden;
    background: #0a0c0e;
    border-radius: 3px;
  }

  /* Hidden clickable hotspots on the TV's physical buttons */
  .tv-btn {
    position: absolute;
    z-index: 4;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    border: none;
    background: transparent;
    -webkit-tap-highlight-color: transparent;
  }
  .tv-btn:hover { opacity: 1; background: rgba(0,0,0,0.06); border-radius: 50%; }

  /* CH- button — left ring button */
  .tv-btn-chdn {
    top: 75.5%;
    left: 55.5%;
    width: 3%;
    height: 3%;
    border-radius: 50%;
  }
  /* CH+ button — right ring button */
  .tv-btn-chup {
    top: 75.5%;
    left: 58%;
    width: 3%;
    height: 3%;
    border-radius: 50%;
  }

  /* Channel number display */
  .channel-display {
    position: absolute;
    top: 12px; right: 16px;
    z-index: 3;
    font-family: 'VT323', monospace;
    text-align: right;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .channel-display.show { opacity: 1; }

  .channel-display .ch-label {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
  }

  .channel-display .ch-num {
    font-size: 2rem;
    font-weight: bold;
    color: rgba(255,255,255,0.9);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.15);
    display: block;
    font-family: 'VT323', monospace;
  }

  /* Now playing */
  .now-playing {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 3;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 30px 16px 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .screen-area:hover .now-playing { opacity: 1; }

  .now-playing .np-title {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.9);
    text-shadow: 1px 1px 0 #000;
  }

  .now-playing .np-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.3);
    margin-top: 4px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Buttons */
  .remote {
    margin-top: -18px;
    width: min(70vw, 580px);
    z-index: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .remote-row {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .btn {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.5rem;
    font-weight: 600;
    padding: 7px 14px;
    letter-spacing: 0.35em;
    background: transparent;
    color: #999;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:hover {
    color: #555;
    border-color: rgba(0,0,0,0.12);
    background: rgba(0,0,0,0.02);
  }

  .btn-icon {
    padding: 10px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
  }

  .btn:active { transform: scale(0.97); }

  .btn.on {
    color: #444;
    border-color: rgba(0,0,0,0.12);
    background: rgba(0,0,0,0.03);
  }

  /* Content container — left-aligned block */
  .content-block {
    width: min(70vw, 500px);
    text-align: left;
    z-index: 1;
    position: relative;
  }

  /* Header */
  .hdr {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    color: rgba(0,0,0,0.3);
    letter-spacing: 0.12em;
    text-transform: lowercase;
    margin-top: 40px;
    margin-bottom: 6px;
    text-align: left;
    z-index: 1;
    position: relative;
  }

  .hdr span {
    color: rgba(0,0,0,0.3);
  }

  .hdr-sub {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.5rem;
    font-weight: 600;
    color: rgba(0,0,0,0.18);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 3px;
    display: none;
    text-align: left;
    z-index: 1;
    position: relative;
  }

  /* Footer */
  .ftr {
    width: min(70vw, 500px);
    display: flex;
    justify-content: space-between;
    margin-top: 60px;
    padding: 20px 0;
    border-top: 1px solid rgba(0,0,0,0.06);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.5rem;
    font-weight: 600;
    color: rgba(0,0,0,0.15);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    z-index: 1;
    position: relative;
  }

  .ftr a {
    color: rgba(0,0,0,0.15);
    text-decoration: none;
    transition: color 0.2s;
  }

  .ftr a:hover { color: rgba(0,0,0,0.35); }

  .ftr-left, .ftr-right {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  /* Social handles */
  .hdr-socials {
    display: flex;
    gap: 16px;
    justify-content: flex-start;
    margin-bottom: 8px;
    z-index: 1;
    position: relative;
  }

  .hdr-socials a {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.5rem;
    font-weight: 600;
    color: rgba(0,0,0,0.18);
    text-decoration: none;
    letter-spacing: 0.25em;
    text-transform: lowercase;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
  }

  .hdr-socials a:hover { color: rgba(0,0,0,0.35); }

  .hdr-socials svg { opacity: 0.3; }
  .hdr-socials a:hover svg { opacity: 0.5; }

  /* About */
  .about-section {
    margin-top: 50px;
    width: min(70vw, 500px);
    z-index: 1;
    position: relative;
    text-align: left;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 28px 32px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .about-section p {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 700;
    color: rgba(0,0,0,0.2);
    line-height: 1.6;
    margin: 0;
  }

  /* ── Book Me ── */
  .book-section {
    margin-top: 60px;
    width: min(70vw, 500px);
    z-index: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 28px 32px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .book-title {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    color: rgba(0,0,0,0.25);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: left;
  }

  .book-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .book-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .book-row-inline {
    display: flex;
    gap: 10px;
  }

  .book-row-inline > * {
    flex: 1;
    min-width: 0;
  }

  .book-input, .book-select, .book-textarea {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    padding: 12px 14px;
    background: rgba(255,255,255,0.6);
    color: #333;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.02em;
    width: 100%;
  }

  .book-input::placeholder, .book-textarea::placeholder {
    color: rgba(0,0,0,0.25);
  }

  .book-input:focus, .book-select:focus, .book-textarea:focus {
    border-color: rgba(0,0,0,0.15);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
  }

  .book-select {
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='rgba(0,0,0,0.2)'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 34px;
    cursor: pointer;
  }

  .book-textarea {
    resize: vertical;
    min-height: 70px;
  }

  .book-submit {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 12px 0;
    letter-spacing: 0.15em;
    background: rgba(0,0,0,0.06);
    color: rgba(0,0,0,0.45);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    width: 100%;
    margin-top: 4px;
  }

  .book-submit:hover {
    background: rgba(0,0,0,0.1);
    color: rgba(0,0,0,0.65);
    border-color: rgba(0,0,0,0.14);
  }

  .book-submit:active { transform: scale(0.99); }

  .book-sent {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(0,0,0,0.3);
    display: none;
    padding: 12px 0;
    text-align: left;
  }

  .book-sent.show { display: block; }

  @media (max-width: 700px) {
    .book-section { width: 90vw; padding: 20px 20px; }
    .book-row { flex-direction: column; }
    .book-row-inline { flex-direction: column; }
  }

  @media (max-width: 400px) {
    .book-section { width: 96vw; }
    .about-section { width: 96vw; }
  }

  /* Channel switch flash */
  @keyframes flash {
    0% { opacity: 1; background: #fff; }
    15% { opacity: 0.8; background: #111; }
    30% { opacity: 1; background: #888; }
    50% { opacity: 0; }
    100% { opacity: 0; }
  }

  .flash {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 4;
    border-radius: 3px;
    opacity: 0;
  }

  .flash.go { animation: flash 0.4s ease-out forwards; }

  /* Play button overlay for mobile */
  .play-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 6;
    background: rgba(10,12,14,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 3px;
    -webkit-tap-highlight-color: transparent;
  }

  .play-overlay.hidden { display: none; }

  .play-icon {
    width: 60px; height: 60px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    transition: transform 0.2s, border-color 0.2s;
  }

  .play-overlay:hover .play-icon { border-color: rgba(255,255,255,0.5); }
  .play-overlay:active .play-icon { transform: scale(0.9); border-color: rgba(255,255,255,0.6); }

  .play-icon svg { margin-left: 3px; }

  .play-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  #ytplayer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  @media (max-width: 700px) {
    .tv-image { width: 90vw; }
    .remote { width: 90vw; padding: 16px 16px 14px; }
    .btn { font-size: 0.55rem; }
    body { padding: 24px 12px; }
  }

  @media (max-width: 400px) {
    .tv-image { width: 96vw; }
    .remote { width: 96vw; }
  }
</style>
</head>

    </div>
    <div class="remote-row">
      <button class="btn" id="bMusic">music videos</button>
      <button class="btn" id="bLive">live sets</button>
      <button class="btn on" id="bAll">all</button>
    </div>
  </div>
</div>


<div class="book-section">
  <div class="book-title">book cortney</div>
  <form class="book-form" id="bookForm">
    <input class="book-input" type="text" name="band" placeholder="band / artist name" required>
    <input class="book-input" type="email" name="email" placeholder="email" required>
    <input class="book-input" type="tel" name="phone" placeholder="phone" required>
    <div class="book-row-inline">
      <select class="book-select" name="type" required>
        <option value="" disabled selected>what do you need?</option>
        <option value="live-full">$250 — live set / full set</option>
        <option value="live-three">$150 — live set / three songs</option>
        <option value="live-highlight">$200 — live set / highlight montage</option>
        <option value="music-video">$500 — music video</option>
        <option value="promo">$300 — promo / content</option>
        <option value="other">other — let's talk</option>
      </select>
      <input class="book-input" type="date" name="date" required>
    </div>
    <input class="book-input" type="text" name="venue" placeholder="venue" required>
    <textarea class="book-textarea" name="details" placeholder="tell me about it — set times, vibe, anything else"></textarea>
    <button class="book-submit" type="submit">Submit Request</button>
    <div class="book-sent" id="bookSent">sent — cortney will be in touch</div>
  </form>
</div>

<div class="ftr">

    <a href="https://instagram.com/cortneyhell" target="_blank">instagram</a>

</div>

var cat = 'all';
var shuf = true;
var list = [];
var idx = 0;
var chTimer = null;
var player = null;
var playerReady = false;
var started = false;

function shuffleArr(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function buildList() {
  var src;
  if (cat === 'music') src = musicVids.slice();
  else if (cat === 'live') src = liveVids.slice();
  else src = musicVids.concat(liveVids);
  list = shuf ? shuffleArr(src) : src;
}

function doFlash() {
  var el = document.getElementById('flash');
  el.classList.remove('go');
  void el.offsetWidth;
  el.classList.add('go');
}

function showCh() {
  var d = document.getElementById('chDisp');
  document.getElementById('chNum').textContent = String(idx + 1).padStart(2, '0');
  d.classList.add('show');
  clearTimeout(chTimer);
  chTimer = setTimeout(function() { d.classList.remove('show'); }, 3000);
}

function loadVideo(i) {
  if (list.length === 0 || !playerReady) return;
  idx = ((i % list.length) + list.length) % list.length;
  var v = list[idx];
  doFlash();
  player.loadVideoById({ videoId: v.id });
  document.getElementById('npTitle').textContent = v.t;
  showCh();
}

function nextCh() { loadVideo(idx + 1); }
function prevCh() { loadVideo(idx - 1); }

function togShuf() {
  shuf = !shuf;
  document.getElementById('bShuf').classList.toggle('on', shuf);
  buildList();
  idx = 0;
  loadVideo(0);
}

function setCat(c) {
  cat = c;
  document.getElementById('bMusic').classList.toggle('on', c === 'music');
  document.getElementById('bLive').classList.toggle('on', c === 'live');
  document.getElementById('bAll').classList.toggle('on', c === 'all');
  buildList();
  idx = 0;
  loadVideo(0);
}

function onYouTubeIframeAPIReady() {
  buildList();
  var firstVid = list[0];

  player = new YT.Player('ytplayer', {
    videoId: firstVid.id,
    playerVars: {
      autoplay: 0,
      mute: 1,
      playsinline: 1,
      controls: 1,
      rel: 0,
      modestbranding: 1,
      iv_load_policy: 3
    },
    events: {
      onReady: function(event) {
        playerReady = true;
        document.getElementById('npTitle').textContent = firstVid.t;
        showCh();

        event.target.mute();
        event.target.playVideo();

        setTimeout(function() {
          var state = player.getPlayerState();
          if (state === 1) {
            document.getElementById('playOverlay').classList.add('hidden');
            started = true;
          }
        }, 1500);
      },
      onStateChange: function(event) {
        if (event.data === 0) { nextCh(); }
        if (event.data === 1) {
          document.getElementById('playOverlay').classList.add('hidden');
          started = true;
        }
      }
    }
  });
}

document.getElementById('playOverlay').addEventListener('click', function() {
  if (playerReady) {
    player.unMute();
    player.playVideo();
    this.classList.add('hidden');
    started = true;
  }
});

// Remote buttons
document.getElementById('bPrev').addEventListener('click', function() { prevCh(); });
document.getElementById('bNext').addEventListener('click', function() { nextCh(); });
document.getElementById('bShuf').addEventListener('click', function() { togShuf(); });
document.getElementById('bMusic').addEventListener('click', function() { setCat('music'); });
document.getElementById('bLive').addEventListener('click', function() { setCat('live'); });
document.getElementById('bAll').addEventListener('click', function() { setCat('all'); });

// Hidden TV buttons — easter egg
document.getElementById('tvChDn').addEventListener('click', function() { prevCh(); });
document.getElementById('tvChUp').addEventListener('click', function() { nextCh(); });

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'n') nextCh();
  if (e.key === 'ArrowLeft' || e.key === 'p') prevCh();
  if (e.key === 's') togShuf();
});

// Booking form
document.getElementById('bookForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var data = new FormData(this);
  var obj = {};
  data.forEach(function(v, k) { obj[k] = v; });
  // TODO: wire to backend (Cortney booking flow — texts Cortney, Stripe, etc.)
  console.log('Booking request:', obj);
  this.style.display = 'none';
  document.getElementById('bookSent').classList.add('show');
});
