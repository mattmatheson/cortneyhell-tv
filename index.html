<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORTNEYHELL.TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-y: scroll; overscroll-behavior: none; }

  body {
    background: #111;
    color: #5a5850;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding: 40px 20px 80px;
  }

  .bg-image {
    position: fixed;
    top: -10%; left: -10%;
    width: 120%; height: 120%;
    background-size: cover;
    background-position: center;
    z-index: 0;
    animation: bgSway 30s ease-in-out infinite alternate;
    -webkit-backface-visibility: hidden;
    will-change: transform;
  }

  @keyframes bgSway {
    0% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(2%, -1.5%) scale(1.02); }
    50% { transform: translate(-1.5%, 2%) scale(1.01); }
    75% { transform: translate(1%, 1.5%) scale(1.03); }
    100% { transform: translate(-2%, -1%) scale(1); }
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.15);
    z-index: 0;
  }

  .bg-grain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
    mix-blend-mode: overlay;
    background-repeat: repeat;
    background-size: 256px 256px;
  }


  .vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.15) 100%);
    z-index: 0;
    pointer-events: none;
  }

  .tv-room {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tv-wrapper {
    position: relative;
    display: inline-block;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.5)) drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  }

  .tv-image {
    width: min(77vw, 640px);
    height: auto;
    display: block;
    position: relative;
    z-index: 2;
    pointer-events: none;
    filter: saturate(0.85) brightness(0.95);
  }

  /* Screen area */
  .screen-area {
    position: absolute;
    top: 22.3%;
    left: 20.9%;
    width: 58.2%;
    height: 43.2%;
    z-index: 3;
    overflow: hidden;
    background: #0a0c0e;
    border-radius: 3px;
  }

  /* Hidden clickable hotspots on the TV's physical buttons */
  .tv-btn {
    position: absolute;
    z-index: 4;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    border: none;
    background: transparent;
    -webkit-tap-highlight-color: transparent;
  }
  .tv-btn:hover { opacity: 1; background: rgba(0,0,0,0.06); border-radius: 50%; }

  /* CH- button — left ring button */
  .tv-btn-chdn {
    top: 75.5%;
    left: 55.5%;
    width: 3%;
    height: 3%;
    border-radius: 50%;
  }
  /* CH+ button — right ring button */
  .tv-btn-chup {
    top: 75.5%;
    left: 58%;
    width: 3%;
    height: 3%;
    border-radius: 50%;
  }

  /* Channel number display */
  .channel-display {
    position: absolute;
    top: 12px; right: 16px;
    z-index: 3;
    font-family: 'VT323', monospace;
    text-align: right;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .channel-display.show { opacity: 1; }

  .channel-display .ch-label {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
  }

  .channel-display .ch-num {
    font-size: 2rem;
    font-weight: bold;
    color: rgba(255,255,255,0.9);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.15);
    display: block;
    font-family: 'VT323', monospace;
  }

  /* Now playing */
  .now-playing {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 3;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 30px 16px 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .now-playing.show { opacity: 1; }

  .now-playing .np-title {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.9);
    text-shadow: 1px 1px 0 #000;
  }

  .now-playing .np-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.3);
    margin-top: 4px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Prev/Next flanking the TV */
  .tv-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    background: rgba(190,188,182,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(210,208,200,0.6);
    border-radius: 50%;
    cursor: pointer;
    color: rgba(90,88,80,0.7);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    padding: 8px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.15);
    overflow: hidden;
  }

  .tv-nav::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 128 128' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    border-radius: 50%;
    pointer-events: none;
  }

  .tv-nav:hover {
    color: rgba(80,78,72,0.9);
    background: rgba(200,198,190,0.9);
    border-color: rgba(220,218,210,0.7);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .tv-nav:active { transform: translateY(-50%) scale(0.92); }

  .tv-nav svg {
    width: 28px;
    height: 28px;
  }

  .tv-nav-prev { left: -18px; }
  .tv-nav-next { right: -18px; }

  /* Filter controls under TV */
  .controls {
    margin-top: -70px;
    width: min(70vw, 580px);
    z-index: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .ctrl-btn {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 6px 10px;
    letter-spacing: 0.1em;
    background: transparent;
    color: rgba(255,255,255,0.5);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .ctrl-btn:hover {
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.08);
  }

  .ctrl-btn:active { transform: scale(0.95); }

  .ctrl-btn.on {
    color: rgba(255,255,255,0.8);
  }

  .ctrl-circle {
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ctrl-circle:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.3);
  }

  .ctrl-div {
    width: 1px;
    height: 12px;
    background: rgba(255,255,255,0.2);
  }

  .ctrl-unmute, .ctrl-unmute-div { display: none; }

  @media (max-width: 700px) {
    .ctrl-unmute, .ctrl-unmute-div { display: flex; }
  }

  .ctrl-unmute.hidden, .ctrl-unmute.hidden + .ctrl-unmute-div { display: none !important; }

  /* Content container — left-aligned block */
  .content-block {
    width: min(70vw, 500px);
    text-align: left;
    z-index: 1;
    position: relative;
  }

  /* Header */
  .hdr {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 2rem;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.12em;
    text-transform: lowercase;
    margin-top: 40px;
    margin-bottom: 4px;
    text-align: left;
    z-index: 1;
    position: relative;
  }

  .hdr span {
    color: rgba(0,0,0,0.3);
  }

  .hdr-sub {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.5rem;
    font-weight: 600;
    color: rgba(0,0,0,0.18);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 3px;
    display: none;
    text-align: left;
    z-index: 1;
    position: relative;
  }

  /* Footer */
  .ftr {
    width: min(70vw, 500px);
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 60px;
    padding: 20px 0;
    border-top: none;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    z-index: 1;
    position: relative;
  }

  .ftr a {
    color: rgba(255,255,255,0.9);
    text-decoration: none;
    transition: color 0.2s;
  }

  .ftr a:hover { color: rgba(255,255,255,0.6); }

  .ftr-left, .ftr-right {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  /* Social handles */
  .hdr-socials {
    display: flex;
    gap: 20px;
    justify-content: center;
    z-index: 1;
    position: relative;
  }

  .hdr-socials a {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s;
  }

  .hdr-socials a:hover { color: rgba(255,255,255,0.8); }

  /* About */
  .about-section {
    margin-top: 50px;
    width: min(70vw, 500px);
    z-index: 1;
    position: relative;
    text-align: left;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 28px 32px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .about-section p {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 700;
    color: rgba(0,0,0,0.2);
    line-height: 1.6;
    margin: 0;
  }

  /* ── Book Me ── */
  .book-section {
    margin-top: 60px;
    width: min(70vw, 500px);
    z-index: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 28px 32px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .book-title {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: left;
  }

  .book-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .book-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .book-row-inline {
    display: flex;
    gap: 10px;
  }

  .book-row-inline > * {
    flex: 1;
    min-width: 0;
  }

  .book-input, .book-select, .book-textarea {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    font-weight: 500;
    padding: 12px 14px;
    background: rgba(255,255,255,0.6);
    color: #333;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.02em;
    width: 100%;
  }

  .book-input::placeholder, .book-textarea::placeholder {
    color: rgba(0,0,0,0.25);
  }

  .book-input:focus, .book-select:focus, .book-textarea:focus {
    border-color: rgba(0,0,0,0.15);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
  }

  .book-select {
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='rgba(0,0,0,0.2)'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 34px;
    cursor: pointer;
  }

  .book-input[type="date"] {
    -webkit-appearance: none;
    appearance: none;
    min-height: 48px;
    line-height: normal;
    color: transparent;
  }

  .book-input[type="date"]:valid,
  .book-input[type="date"]:focus {
    color: #333;
  }

  .date-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
    width: 100%;
  }

  .date-wrap .book-input { width: 100%; }

  .date-label {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    color: rgba(0,0,0,0.25);
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .book-input[type="date"]:focus + .date-label,
  .book-input[type="date"]:valid + .date-label {
    opacity: 0;
  }

  .book-textarea {
    resize: vertical;
    min-height: 70px;
  }

  .book-submit {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 12px 0;
    letter-spacing: 0.15em;
    background: rgba(0,0,0,0.08);
    color: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    width: 100%;
    margin-top: 4px;
  }

  .book-submit:hover {
    background: rgba(0,0,0,0.1);
    color: rgba(0,0,0,0.65);
    border-color: rgba(0,0,0,0.14);
  }

  .book-submit:active { transform: scale(0.99); }

  .book-sent {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(0,0,0,0.3);
    display: none;
    padding: 12px 0;
    text-align: left;
  }

  .book-sent.show { display: block; }

  @media (max-width: 700px) {
    .book-section { width: 90vw; padding: 16px 16px; }
    .book-form { gap: 8px; }
    .book-input, .book-select, .book-textarea { font-size: 16px; padding: 10px 12px; }
    .book-submit { font-size: 0.75rem; padding: 10px 0; }
    .book-row { flex-direction: column; }
    .book-row-inline { flex-direction: column; }
  }


  /* Channel switch flash */
  @keyframes flash {
    0% { opacity: 1; background: #fff; }
    15% { opacity: 0.8; background: #111; }
    30% { opacity: 1; background: #888; }
    50% { opacity: 0; }
    100% { opacity: 0; }
  }

  .flash {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 4;
    border-radius: 3px;
    opacity: 0;
  }

  .flash.go { animation: flash 0.4s ease-out forwards; }

  /* Play button overlay for mobile */
  .play-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 6;
    background: rgba(10,12,14,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 3px;
    -webkit-tap-highlight-color: transparent;
  }

  .play-overlay.hidden { display: none; }

  .play-icon {
    width: 60px; height: 60px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    transition: transform 0.2s, border-color 0.2s;
  }

  .play-overlay:hover .play-icon { border-color: rgba(255,255,255,0.5); }
  .play-overlay:active .play-icon { transform: scale(0.9); border-color: rgba(255,255,255,0.6); }

  .play-icon svg { margin-left: 3px; }

  .play-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  #ytplayer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  @media (max-width: 700px) {
    .tv-image { width: 120vw; }
    .controls { width: 90vw; margin-top: -60px; }
    .hdr { margin-bottom: 2px; font-size: 1.8rem; }
    .hdr-socials { margin-top: 0; margin-bottom: 6px; }
    .ftr-right { display: none; }
    .tv-nav-prev { left: -10px; }
    .tv-nav-next { right: -10px; }
    .tv-nav svg { width: 22px; height: 22px; }
    body { padding: 24px 12px; }
  }

</style>
</head>
<body>

<div class="bg-image" id="bgImage"></div>
<div class="bg-grain" id="bgGrain"></div>
<div class="vignette"></div>

<div class="hdr">cortney<span>hell</span>.tv</div>
<div class="hdr-socials" style="margin-bottom:12px;">

</div>

<div class="tv-room">
  <div class="tv-wrapper">
    <img src="tv.png" class="tv-image" alt="TV">
    <div class="screen-area" id="screen">
      <div id="ytplayer"></div>
      <div class="flash" id="flash"></div>
      <div class="channel-display" id="chDisp">
        <span class="ch-label">CH</span>
        <span class="ch-num" id="chNum">01</span>
      </div>
      <div class="now-playing">
        <div class="np-title" id="npTitle">-</div>
        <div class="np-sub">CORTNEYHELL.TV</div>
      </div>
      <div class="play-overlay" id="playOverlay">

var cat = 'all';
var shuf = true;
var list = [];
var idx = 0;
var chTimer = null;
var player = null;
var playerReady = false;
var started = false;

function shuffleArr(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function buildList() {
  var src;
  if (cat === 'music') src = musicVids.slice();
  else if (cat === 'live') src = liveVids.slice();
  else src = musicVids.concat(liveVids);
  list = shuf ? shuffleArr(src) : src;
}

function doFlash() {
  var el = document.getElementById('flash');
  el.classList.remove('go');
  void el.offsetWidth;
  el.classList.add('go');
}

function showCh(v) {
  var d = document.getElementById('chDisp');
  var np = document.querySelector('.now-playing');
  var chNum = v && v.ch ? v.ch : (idx + 1);
  document.getElementById('chNum').textContent = String(chNum).padStart(2, '0');
  d.classList.add('show');
  np.classList.add('show');
  clearTimeout(chTimer);
  chTimer = setTimeout(function() { d.classList.remove('show'); np.classList.remove('show'); }, 3000);
}

function loadVideo(i) {
  if (list.length === 0 || !playerReady) return;
  idx = ((i % list.length) + list.length) % list.length;
  var v = list[idx];
  doFlash();
  player.loadVideoById({ videoId: v.id });
  document.getElementById('npTitle').textContent = v.t;
  showCh(v);
}

function nextCh() { loadVideo(idx + 1); }
function prevCh() { loadVideo(idx - 1); }

function togShuf() {
  shuf = !shuf;
  var shufBtn = document.getElementById('bShuf');
  if (shufBtn) shufBtn.classList.toggle('on', shuf);
  buildList();
  idx = 0;
  loadVideo(0);
}

function setCat(c) {
  cat = c;
  document.getElementById('bMusic').classList.toggle('on', c === 'music');
  document.getElementById('bLive').classList.toggle('on', c === 'live');
  document.getElementById('bAll').classList.toggle('on', c === 'all');
  buildList();
  idx = 0;
  loadVideo(0);
}

function onYouTubeIframeAPIReady() {
  buildList();
  var firstVid = list[0];

  player = new YT.Player('ytplayer', {
    videoId: firstVid.id,
    playerVars: {
      autoplay: 1,
      mute: 1,
      playsinline: 1,
      controls: 1,
      rel: 0,
      modestbranding: 1,
      iv_load_policy: 3
    },
    events: {
      onReady: function(event) {
        playerReady = true;
        document.getElementById('npTitle').textContent = firstVid.t;
        showCh(firstVid);

        event.target.mute();
        event.target.playVideo();

        // Retry autoplay once after a delay
        setTimeout(function() {
          if (!started && playerReady) {
            var state = player.getPlayerState();
            if (state === 1) {
              document.getElementById('playOverlay').classList.add('hidden');
              started = true;
            } else {
              player.mute();
              player.playVideo();
            }
          }
        }, 1500);
      },
      onStateChange: function(event) {
        if (event.data === 0) { nextCh(); }
        if (event.data === 1) {
          document.getElementById('playOverlay').classList.add('hidden');
          started = true;
        }
      }
    }
  });
}

document.getElementById('playOverlay').addEventListener('click', function() {
  var overlay = this;
  if (playerReady) {
    player.unMute();
    player.playVideo();
    overlay.classList.add('hidden');
    started = true;
  } else {
    // Player not ready yet — wait for it
    var waitReady = setInterval(function() {
      if (playerReady) {
        clearInterval(waitReady);
        player.unMute();
        player.playVideo();
        overlay.classList.add('hidden');
        started = true;
      }
    }, 300);
  }
});

// Mobile unmute button
document.getElementById('bUnmute').addEventListener('click', function() {
  if (playerReady && player) {
    player.unMute();
    this.classList.add('hidden');
  }
});

// Unmute on first user interaction anywhere
document.addEventListener('click', function unmute() {
  if (playerReady && player) {
    player.unMute();
    document.removeEventListener('click', unmute);
  }
